version: 2

sources:
  - name: supabase
    database: ONEONONE_DB
    schema: RAW
    description: Raw source tables loaded from Supabase (PostgreSQL) by the Python ingestion layer.
    freshness:
      warn_after: { count: 25, period: hour }
      error_after: { count: 49, period: hour }
    loaded_at_field: _dbt_loaded_at
    tables:
      - name: users
        description: All user accounts (managers and reportees).
      - name: boards
        description: One-to-one feedback boards; each board belongs to one manager.
      - name: memberships
        description: Membership records linking reportees to boards (full refresh).
      - name: entries
        description: Work journal entries submitted by reportees (incremental by updatedAt).
      - name: announcements
        description: Manager-authored announcements posted to a board.
      - name: announcement_reactions
        description: Emoji reactions to announcements (full refresh).
      - name: subscriptions
        description: Subscription records tracking plan, status, and billing cycle.
      - name: support_requests
        description: Support tickets submitted by users (full refresh).
      - name: usage_events
        description: Append-only event log for quota tracking (never updated after creation).
