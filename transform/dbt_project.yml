name: 'oneonone'
version: '1.0.0'
profile: 'transform'

model-paths: ["models"]
analysis-paths: ["analyses"]
test-paths: ["tests"]
seed-paths: ["seeds"]
macro-paths: ["macros"]
snapshot-paths: ["snapshots"]

clean-targets:
  - "target"
  - "dbt_packages"

models:
  oneonone:
    staging:
      +materialized: view
      +schema: staging
    intermediate:
      +materialized: view
      +schema: intermediate
    marts:
      +materialized: table
      +schema: marts

seeds:
  oneonone:
    +schema: staging
    plan_pricing:
      +column_types:
        plan: varchar
        monthly_price: number(18,2)
        annual_price: number(18,2)